<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }

    /* Light mode (default) */
    body {
      background: #f3f2f7;
      color: #272d37;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #d5dde5;
    }

    .header img { width: 32px; height: 32px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #272d37; }
    .header .version { font-size: 11px; color: #adb9c7; margin-left: auto; }

    .status { padding: 16px; text-align: center; }
    .status-icon { font-size: 28px; margin-bottom: 8px; }
    .status-text { font-size: 13px; color: #66737f; line-height: 1.5; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #d5dde5;
      margin: 0 16px 16px;
      border-radius: 8px;
      overflow: hidden;
    }

    .stat-cell { background: #fff; padding: 14px; text-align: center; }
    .stat-cell .value { font-size: 20px; font-weight: 700; color: #272d37; }
    .stat-cell .label {
      font-size: 10px; color: #adb9c7; text-transform: uppercase;
      letter-spacing: 0.5px; margin-top: 4px;
    }

    .progress-bar-wrap {
      margin: 0 16px 16px;
      height: 8px;
      background: #e8e5f0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff9301, #ffb347);
      border-radius: 4px;
      transition: width 0.5s;
    }

    .actions { padding: 0 16px 16px; display: flex; gap: 8px; }

    .actions button {
      flex: 1;
      padding: 10px;
      border: 1px solid #d5dde5;
      border-radius: 6px;
      background: #fff;
      color: #272d37;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .actions button:hover {
      background: #f0eef8;
      border-color: #6354b1;
      color: #6354b1;
    }

    .actions button.primary {
      background: #6354b1;
      border-color: #6354b1;
      color: #fff;
    }

    .actions button.primary:hover {
      background: #8377c1;
      border-color: #8377c1;
    }

    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #adb9c7;
      border-top: 1px solid #eef2f6;
    }

    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }

    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #e8e5f0;
      border-top-color: #6354b1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error { padding: 16px; text-align: center; color: #ff6275; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background: #121212; color: #fff; }
      .header { background: #181818; border-bottom-color: #333; }
      .header h1 { color: #fff; }
      .header .version { color: #66737f; }
      .status-text { color: #adb9c7; }
      .stats-grid { background: #333; }
      .stat-cell { background: #181818; }
      .stat-cell .value { color: #fff; }
      .stat-cell .label { color: #66737f; }
      .progress-bar-wrap { background: #282828; }
      .actions button { background: #282828; border-color: #333; color: #fff; }
      .actions button:hover { background: #333; border-color: #8377c1; color: #8377c1; }
      .actions button.primary { background: #6354b1; border-color: #6354b1; color: #fff; }
      .actions button.primary:hover { background: #8377c1; }
      .footer { color: #66737f; border-top-color: #282828; }
      .spinner { border-color: #282828; border-top-color: #8377c1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../images/icon-48.png" alt="DS Enhancer" onerror="this.style.display='none'">
    <h1>DS Enhancer</h1>
    <span class="version">v0.1.0</span>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="footer">
    Open a Dreaming Spanish tab to see your progress
  </div>

  <script src="popup.js"></script>
</body>
</html>
