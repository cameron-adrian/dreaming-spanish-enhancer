<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 200px;
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
    }

    .header img {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header .version {
      font-size: 11px;
      color: #666;
      margin-left: auto;
    }

    .status {
      padding: 16px;
      text-align: center;
    }

    .status-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .status-text {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #2a2a4a;
      margin: 0 16px 16px;
      border-radius: 8px;
      overflow: hidden;
    }

    .stat-cell {
      background: #16162a;
      padding: 14px;
      text-align: center;
    }

    .stat-cell .value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .stat-cell .label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .progress-bar-wrap {
      margin: 0 16px 16px;
      height: 8px;
      background: #1e1e3a;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      border-radius: 4px;
      transition: width 0.5s;
    }

    .actions {
      padding: 0 16px 16px;
      display: flex;
      gap: 8px;
    }

    .actions button {
      flex: 1;
      padding: 10px;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      background: #1a1a30;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .actions button:hover {
      background: #2a2a4a;
      color: #fff;
      border-color: #5a5a7a;
    }

    .actions button.primary {
      background: #1b5e20;
      border-color: #2e7d32;
      color: #fff;
    }

    .actions button.primary:hover {
      background: #2e7d32;
    }

    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #555;
      border-top: 1px solid #1e1e3a;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #2a2a4a;
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      padding: 16px;
      text-align: center;
      color: #ef5350;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../images/icon-48.png" alt="DS Enhancer" onerror="this.style.display='none'">
    <h1>DS Enhancer</h1>
    <span class="version">v0.1.0</span>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="footer">
    Open a Dreaming Spanish tab to see your progress
  </div>

  <script src="popup.js"></script>
</body>
</html>
